# Статический анализ Dart/Flutter для VasoLog
# База: very_good_analysis (Very Good Ventures, 150+ правил)
# https://pub.dev/packages/very_good_analysis
#
# Migration strategy: правила добавлены постепенно.
# Шумные правила отключены - включим по мере исправления кода.

include: package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    # Info-level правила (не блокируют сборку)
    todo: ignore
    public_member_api_docs: ignore
    lines_longer_than_80_chars: ignore
    # Strict typing - включим после рефакторинга
    inference_failure_on_instance_creation: ignore
    inference_failure_on_function_invocation: ignore
    inference_failure_on_collection_literal: ignore
    # Избыточные для solo проекта
    prefer_final_parameters: ignore
    avoid_positional_boolean_parameters: ignore
    one_member_abstracts: ignore
    sort_pub_dependencies: ignore
    diagnostic_describe_all_properties: ignore
  exclude:
    - build/**
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - lib/generated/**
    - lib/l10n/generated/**

linter:
  rules:
    # Критичные правила всегда включены
    avoid_print: true
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    require_trailing_commas: true
    # Отключены до постепенной миграции
    lines_longer_than_80_chars: false
    prefer_final_parameters: false
