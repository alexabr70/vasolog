name: vasolog
description: "VasoLog - Raynaud's Phenomenon Tracker"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Локальное хранилище (без кодогенерации)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Геолокация
  geolocator: ^13.0.2
  # HTTP для погодного API
  http: ^1.4.0
  # Камера / фото
  image_picker: ^1.1.2
  # PDF генерация
  pdf: ^3.11.2
  printing: ^5.13.5
  # Графики
  fl_chart: ^0.70.2
  # State management
  provider: ^6.1.4
  # Форматирование дат
  intl: ^0.20.2
  # Хранение файлов
  path_provider: any
  # UUID
  uuid: ^4.5.1
  # Разрешения
  permission_handler: ^11.4.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.4
  flutter_native_splash: ^2.4.7
  url_launcher: ^6.3.1
  in_app_review: ^2.0.10
  # Локальные уведомления
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1
  # Home screen widget
  home_widget: ^0.7.0
  # Deep linking
  app_links: ^6.3.3
  google_fonts: ^8.0.2
  # Инфо о пакете (version + buildNumber из pubspec для экрана Инфо)
  package_info_plus: ^8.1.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  # Статический анализ (150+ правил от Very Good Ventures)
  very_good_analysis: ^6.0.0
  # Визуальная регрессия (golden tests на разных размерах экрана)
  golden_toolkit: ^0.15.0
  # Моки для unit/widget тестов
  mocktail: ^1.0.4
  # Property-based testing (находит edge cases через рандом входы)
  glados: ^1.1.4
  # Mutation testing (проверка качества тестов)
  mutation_test: ^1.2.7
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#5C6BC0"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#5C6BC0"
  image: "assets/icon/splash_icon_small.png"
  color_dark: "#1A237E"
  image_dark: "assets/icon/splash_icon_small.png"
  android_12:
    color: "#5C6BC0"
    icon_background_color: "#5C6BC0"
    image: "assets/icon/splash_icon_android12.png"
    color_dark: "#1A237E"
    icon_background_color_dark: "#1A237E"
    image_dark: "assets/icon/splash_icon_android12.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
