name: Flutter CI

# Автоматический pipeline для VasoLog:
# 1. Анализ кода (flutter analyze)
# 2. Unit + widget + golden тесты
# 3. Сборка APK
# 4. Android emulator + Maestro flows
# 5. Monkey fuzz testing
# 6. Upload artifacts (APK, скриншоты, видео, логи)
#
# Trigger: push/PR в master/main + ручной запуск (workflow_dispatch)

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.41.6"
  JAVA_VERSION: "21"

jobs:
  analyze-and-test:
    name: Analyze + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      - name: Dart format check
        run: dart format --set-exit-if-changed --output=none .
        continue-on-error: true

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        # Исключаем golden tests - они pixel-perfect и отличаются между Windows/Linux
        run: flutter test --coverage --reporter=github --exclude-tags golden

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 7

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze-and-test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vasolog-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

  maestro-tests:
    name: Maestro E2E on Emulator
    runs-on: ubuntu-latest
    needs: build-android
    timeout-minutes: 45
    strategy:
      matrix:
        api-level: [34]
        target: [google_apis]
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: vasolog-debug-apk
          path: build/app/outputs/flutter-apk/

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}

      - name: Create AVD and generate snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: pixel_7
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Однострочник - emulator-runner POSIX sh имеет проблемы с multi-line.
          # uninstall нужен из-за signature mismatch между debug-сборками (cached AVD snapshot)
          script: adb wait-for-device && (adb uninstall com.vasolog.app || true) && adb install -r build/app/outputs/flutter-apk/app-debug.apk && sleep 5 && (maestro test --format junit --output maestro-report.xml .maestro/ || true) && mkdir -p maestro-artifacts && (cp -r ~/.maestro/tests/* maestro-artifacts/ 2>/dev/null || true)

      - name: Upload Maestro artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-results-api${{ matrix.api-level }}
          path: |
            maestro-report.xml
            maestro-artifacts/
          retention-days: 14

  monkey-fuzz:
    name: Monkey Fuzz Test
    runs-on: ubuntu-latest
    needs: build-android
    timeout-minutes: 30
    # Не критичный - fuzzy testing, только уведомляет о крашах
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: vasolog-debug-apk
          path: build/app/outputs/flutter-apk/

      - name: Run monkey
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          # Однострочник - emulator-runner выполняет script через /bin/sh (POSIX),
          # multi-line if/fi блоки парсятся плохо
          script: adb wait-for-device && (adb uninstall com.vasolog.app || true) && adb install -r build/app/outputs/flutter-apk/app-debug.apk && adb logcat -c && (adb shell monkey -p com.vasolog.app -v 2000 --throttle 100 --pct-touch 60 --pct-motion 20 --pct-majornav 10 --pct-syskeys 5 --pct-appswitch 5 > monkey-output.txt 2>&1 || true) && adb logcat -d > logcat.txt && (grep -qE "CRASH|FATAL EXCEPTION|ANR in com.vasolog" logcat.txt monkey-output.txt && echo "::warning::Monkey found potential issues" || echo "Monkey OK")

      - name: Upload monkey logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monkey-logs
          path: |
            monkey-output.txt
            logcat.txt
          retention-days: 7

  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
      - uses: github/codeql-action/analyze@v3
        continue-on-error: true
