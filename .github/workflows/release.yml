name: Release Pipeline

# Релиз VasoLog в App Store Connect (TestFlight) + Google Play.
# Триггер: git tag v*.*.* (например v1.2.0) или ручной workflow_dispatch.
# Один build_number для обеих платформ = github.run_number (детерминированный).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver (например 1.2.0). Если пусто - берётся из тега.'
        required: false
        type: string
      release_track:
        description: 'Google Play track'
        type: choice
        options: [internal, alpha, beta, production]
        default: internal

# Защита от двойного запуска одного тега.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # Единая точка расчёта version + build_number для обеих платформ.
  # Это фиксит P0: раньше iOS и Android получали РАЗНЫЕ номера из store API.
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      build_name: ${{ steps.resolve.outputs.build_name }}
      build_number: ${{ steps.resolve.outputs.build_number }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            BUILD_NAME="$INPUT_VERSION"
          else
            TAG="${GITHUB_REF_NAME}"
            BUILD_NAME="${TAG#v}"
          fi
          if [[ ! "$BUILD_NAME" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Version '$BUILD_NAME' не соответствует semver"
            exit 1
          fi
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "build_name=$BUILD_NAME" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Resolved: $BUILD_NAME+$BUILD_NUMBER"

  build:
    needs: prepare
    uses: ./.github/workflows/_flutter-build.yml
    with:
      flutter_version: '3.41.6'
      ios_bundle_id: 'com.vasolog.app'
      android_package_name: 'com.vasolog.app'
      release_track: ${{ inputs.release_track || 'internal' }}
      build_name: ${{ needs.prepare.outputs.build_name }}
      build_number: ${{ needs.prepare.outputs.build_number }}
    secrets: inherit

  github-release:
    name: GitHub Release notes
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.prepare.outputs.build_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
