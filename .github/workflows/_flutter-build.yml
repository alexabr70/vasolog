name: Flutter Build (Reusable)

on:
  workflow_call:
    inputs:
      flutter_version:
        type: string
        default: '3.41.6'
      ios_bundle_id:
        type: string
        required: true
      android_package_name:
        type: string
        required: true
      release_track:
        type: string
        default: 'internal'
      xcode_version:
        type: string
        default: 'latest-stable'

    secrets:
      ASC_API_KEY_ID:
        required: true
      ASC_API_KEY_ISSUER_ID:
        required: true
      ASC_API_KEY_CONTENT:
        required: true
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_URL:
        required: true
      KEYSTORE_BASE64:
        required: true
      KEYSTORE_PASSWORD:
        required: true
      KEY_ALIAS:
        required: true
      KEY_PASSWORD:
        required: true
      GOOGLE_PLAY_JSON_KEY_CONTENT:
        required: true

# ─── iOS Build ───────────────────────────────────────────────────────────────
jobs:
  build-ios:
    name: iOS Release
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode ${{ inputs.xcode_version }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode_version }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Write ASC API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_API_KEY_CONTENT }}" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure PrivacyInfo.xcprivacy exists
        run: |
          PLIST="ios/Runner/PrivacyInfo.xcprivacy"
          if [ ! -f "$PLIST" ]; then
            echo "::error::PrivacyInfo.xcprivacy не найден - добавь ios/Runner/PrivacyInfo.xcprivacy"
            exit 1
          fi

      - name: iOS Release via Fastlane
        env:
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          IOS_BUNDLE_ID: ${{ inputs.ios_bundle_id }}
        run: bundle exec fastlane ios release

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 7

# ─── Android Build ────────────────────────────────────────────────────────────
  build-android:
    name: Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Write Google Play JSON Key
        run: |
          echo '${{ secrets.GOOGLE_PLAY_JSON_KEY_CONTENT }}' \
            > android/fastlane/google-play-key.json

      - name: Android Release via Fastlane
        env:
          ANDROID_PACKAGE_NAME: ${{ inputs.android_package_name }}
          RELEASE_TRACK: ${{ inputs.release_track }}
        run: bundle exec fastlane android release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 7

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties
          rm -f android/fastlane/google-play-key.json
