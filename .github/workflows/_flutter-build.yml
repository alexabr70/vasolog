name: Flutter Build (Reusable)

# Параллельная сборка iOS (TestFlight) + Android (Google Play).
# iOS → macos-26 (10x cost, необходим для Xcode).
# Android → ubuntu-latest (1x cost, экономим квоту).
# Build name и build number приходят из вызывающего release.yml (детерминированные).

on:
  workflow_call:
    inputs:
      flutter_version:
        type: string
        default: '3.41.6'
      ios_bundle_id:
        type: string
        required: true
      android_package_name:
        type: string
        required: true
      release_track:
        type: string
        default: 'internal'
      build_name:
        description: 'Semver из release.yml (например 1.2.0)'
        type: string
        required: true
      build_number:
        description: 'Build number из release.yml (github.run_number)'
        type: string
        required: true

    secrets:
      ASC_API_KEY_ID:
        required: true
      ASC_API_KEY_ISSUER_ID:
        required: true
      ASC_API_KEY_CONTENT:
        description: 'base64 от .p8 файла'
        required: true
      MATCH_GIT_BASIC_AUTHORIZATION:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_URL:
        required: true
      KEYSTORE_BASE64:
        required: true
      KEYSTORE_PASSWORD:
        required: true
      KEY_ALIAS:
        required: true
      KEY_PASSWORD:
        required: true
      GOOGLE_PLAY_JSON_KEY_BASE64:
        description: 'base64 от service-account JSON'
        required: true

jobs:
  # ─── iOS Build ───────────────────────────────────────────────────────────────
  build-ios:
    name: iOS Release
    runs-on: macos-26
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write

    env:
      BUILD_NAME: ${{ inputs.build_name }}
      BUILD_NUMBER: ${{ inputs.build_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode (latest-stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # base64 -d совместим с BSD (macOS) и GNU (Linux). --decode - только GNU.
      - name: Write ASC API Key
        env:
          ASC_KEY_B64: ${{ secrets.ASC_API_KEY_CONTENT }}
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_B64" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      - name: Flutter pub get
        run: flutter pub get

      # Единый источник правды для версии - sed работает на BSD и GNU.
      - name: Update pubspec.yaml version
        shell: bash
        run: |
          set -euo pipefail
          sed -i.bak "s/^version: .*/version: ${BUILD_NAME}+${BUILD_NUMBER}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep "^version:" pubspec.yaml

      - name: Verify PrivacyInfo.xcprivacy
        run: |
          if [ ! -f "ios/Runner/PrivacyInfo.xcprivacy" ]; then
            echo "::error::ios/Runner/PrivacyInfo.xcprivacy не найден"
            exit 1
          fi

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      # Явный pod install - чтобы не падать на первом билде из-за чистого окружения.
      - name: Pod install
        working-directory: ios
        run: pod install --repo-update

      - name: iOS Release via Fastlane
        env:
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          IOS_BUNDLE_ID: ${{ inputs.ios_bundle_id }}
        run: bundle exec fastlane ios release

      - name: Locate IPA
        id: ipa
        shell: bash
        run: |
          set -euo pipefail
          IPA=$(find build/ios/ipa -name "*.ipa" -type f | head -n1)
          if [[ -z "$IPA" ]]; then
            echo "::error::IPA не найден в build/ios/ipa"
            exit 1
          fi
          echo "path=$IPA" >> "$GITHUB_OUTPUT"
          ls -lh "$IPA"

      # Supply chain provenance - подписывает артефакт через GitHub sigstore.
      - name: Attest IPA provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.ipa.outputs.path }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ inputs.build_name }}-${{ inputs.build_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      # Debug symbols для symbolication crash reports. Храним дольше IPA.
      - name: Upload iOS debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ios-symbols-${{ inputs.build_name }}-${{ inputs.build_number }}
          path: build/symbols
          retention-days: 90
          if-no-files-found: warn

  # ─── Android Build ────────────────────────────────────────────────────────────
  build-android:
    name: Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write

    env:
      BUILD_NAME: ${{ inputs.build_name }}
      BUILD_NUMBER: ${{ inputs.build_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode Android Keystore
        env:
          KS_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$KS_B64" | base64 -d > android/app/upload-keystore.jks
          chmod 600 android/app/upload-keystore.jks

      - name: Create key.properties
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          cat > android/key.properties << EOF
          storePassword=${STORE_PASS}
          keyPassword=${KEY_PASS}
          keyAlias=${KEY_ALIAS}
          storeFile=upload-keystore.jks
          EOF
          chmod 600 android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Update pubspec.yaml version
        shell: bash
        run: |
          set -euo pipefail
          sed -i.bak "s/^version: .*/version: ${BUILD_NAME}+${BUILD_NUMBER}/" pubspec.yaml
          rm -f pubspec.yaml.bak
          grep "^version:" pubspec.yaml

      # base64 -d вместо raw echo - надёжнее при multiline JSON и special chars.
      # Пишем в абсолютный путь - Fastfile читает его через GOOGLE_PLAY_JSON_KEY_PATH.
      - name: Decode Google Play JSON Key
        env:
          PLAY_KEY_B64: ${{ secrets.GOOGLE_PLAY_JSON_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.play"
          echo "$PLAY_KEY_B64" | base64 -d > "$HOME/.play/google-play-key.json"
          chmod 600 "$HOME/.play/google-play-key.json"
          echo "GOOGLE_PLAY_JSON_KEY_PATH=$HOME/.play/google-play-key.json" >> "$GITHUB_ENV"

      - name: Android Release via Fastlane
        env:
          ANDROID_PACKAGE_NAME: ${{ inputs.android_package_name }}
          RELEASE_TRACK: ${{ inputs.release_track }}
        run: bundle exec fastlane android release

      - name: Locate AAB
        id: aab
        shell: bash
        run: |
          set -euo pipefail
          AAB="build/app/outputs/bundle/release/app-release.aab"
          if [[ ! -f "$AAB" ]]; then
            echo "::error::AAB не найден: $AAB"
            exit 1
          fi
          echo "path=$AAB" >> "$GITHUB_OUTPUT"
          ls -lh "$AAB"

      - name: Attest AAB provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.aab.outputs.path }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ inputs.build_name }}-${{ inputs.build_number }}
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload Android debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: android-symbols-${{ inputs.build_name }}-${{ inputs.build_number }}
          path: build/symbols
          retention-days: 90
          if-no-files-found: warn

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties
          rm -f "$HOME/.play/google-play-key.json"
