# Баг #5: диаграмма рук - проверяем что все 10 пальцев кликабельны и подписаны
appId: com.vasolog.app
name: Hand Diagram Tappability
tags:
  - regression
  - ui
---
- launchApp
- waitForAnimationToEnd
- tapOn:
    point: "50%,90%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 03_hand_diagram_before
# Скроллим к диаграмме рук (обычно ниже severity slider)
- scroll
- takeScreenshot: 03_hand_diagram_scrolled
# AI визуальная проверка: все 10 пальцев видны, подписи не обрезаны
- assertNoDefectsWithAi:
    optional: true
